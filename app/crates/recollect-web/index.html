          choiceUi.offer = false; choiceUi.sig = null;
          if (!isOnline()) refresh(); // back to the playable shell (sets the gameplay prompt)
          // The opening beat resolved: lead the live region with the FACT, then re-state the
          // opener (design §5 — always name the first player) ahead of the gameplay prompt.
          leadStatus("You keep your opening hand.");
          leadOpener();
          return;
        }
        if (verb === "mulligan") {
          choiceUi.offer = false; choiceUi.sig = null;
          // Online: ship a Mulligan for YOUR seat (the server resolves + pushes the view).
          if (isOnline()) dispatchCmd({ Mulligan: { seat: youSeat() } }, "Mulligan");
          else { report(game.mulligan(), "Mulligan"); refresh(); }
          // The announcement states only the FACT (redaction) — never the cards drawn.
          leadStatus("You mulligan — a fresh hand, one card to the bottom.");
          leadOpener();
          return;
        }
        if (verb === "choose") {
          // Online: ship Command::Choose; the server resolves the Glimpse step + pushes the
          // next view (the keep step, or your turn). Local: apply through the engine.
          if (isOnline()) dispatchCmd({ Choose: { index } }, "Choose");
          else { report(game.choose(index), "Choose"); refresh(); }
          return;
        }
      }

      // Announce the active choice step in the #status live region (invariant 7), once per
      // NEW step (deduped by a signature) so the screen reader narrates "burn a card…",
      // then "you peek…", then clears — not every frame. Called from the frame loop.
      function maybeAnnounceChoice() {
        const prompt = currentChoice();
        if (!prompt) { choiceUi.sig = null; return; }
        const sig = prompt.kind + ":" + prompt.options.length;
        if (sig === choiceUi.sig) return;
        choiceUi.sig = sig;
        // The title + subtitle is the live-region narration (one source with the on-canvas
        // modal). The peeked card name (keep step) rides along so the reader knows the card.
        let line = prompt.title + (prompt.subtitle ? ` — ${prompt.subtitle}` : "");
        if (prompt.peeked && prompt.peeked.name) line += `. The top card is ${prompt.peeked.name}.`;
        announce(line);
      }

      // F-29: the three offered styles, each with the deck it derives at this seed.
      function showPicker() {
        if (watch) { clearInterval(watch); watch = null; }
        if (online) { try { online.ws.close(); } catch (_) {} online = null; }
        cancelReplay(); // drop any in-flight opponent replay
        clearResultScreen(); cancelDusk(); // #100 Phase D — drop any result/Dusk overlay
        choiceUi.offer = false; choiceUi.sig = null; // #26 — drop any pending mulligan offer
        game = null;
        clearSelection();
        _a11ySig = null; $("shell-a11y").innerHTML = ""; // leaving the local shell — drop its a11y tree
        board.inspect = null; board.inspectId = null;
        setShellLayout(); // back to the square board for the picker
        const seed = seed64();
        const offers = JSON.parse(LocalGame.quick_offer_json(seed));
        const p = $("picker");
        p.style.display = "block";
        $("hand").innerHTML = "";
        $("moves").innerHTML = "";
        // Difficulty picker (TUI parity): Easy / Normal / Hard / Expert.
        const diffs = JSON.parse(LocalGame.difficulties_json());
        const opts = diffs.map((d) => `<option value="${d.index}"${d.default ? " selected" : ""}>${d.name}</option>`).join("");
        // The difficulty select carries a real <label for> (programmatic name) — a bare
        // "Opponent:" text node isn't an accessible name (WCAG 4.1.2 select-name).
        p.innerHTML = `<h3>Choose your telling</h3><div><label for="diff">Opponent difficulty: <select id="diff">${opts}</select></label></div>`;
        $("status").textContent = "preview each style's deck, then pick one";
        offers.forEach((o) => {
          const pv = JSON.parse(LocalGame.deck_preview_json(seed, o.id));
          const curve = pv.curve.map((n, c) => (n ? `${c}:${n}` : "")).filter(Boolean).join("  ");
          const opens = pv.cards.slice(0, 6).map((c) => c.name).join(", ");
          // Each style is an actionable BUTTON (keyboard-operable, a real Tab stop with a
          // visible focus ring — invariant 7), not a bare <div onclick>. The OBJECTIVE
          // selection-info (resonance lean · tempo · aggression · body-mix, computed in
          // core over many deck-gen seeds) renders as chips AND — for a screen reader —
          // as the button's explicit aria-label, so the shape is conveyed as WORDS, never
          // only as a row of coloured chips. The inner visuals are aria-hidden so the
          // curated label reads once, cleanly, instead of fragmenting chip by chip.
          const chips = o.selection.facets
            .map((f) => `<span class="facet" title="${esc(f.detail)}">` +
              `<span class="facet-k">${esc(f.dimension)}</span>${esc(f.value)}</span>`)
            .join("");
          const facetText = o.selection.facets
            .map((f) => `${f.dimension}: ${f.value} (${f.detail})`)
            .join("; ");
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "style telling";
          btn.setAttribute("aria-label",
            `Play ${o.name}. ${o.blurb} ${o.selection.summary}. ${facetText}. ` +
            `${pv.spirit_count} spirits, ${pv.spell_count} spellbook cards. Opens with ${opens}.`);
          btn.innerHTML = `<span aria-hidden="true">` +
            `<b>${esc(o.name)}</b> — ${esc(o.blurb)}` +
            `<span class="facets">${chips}</span>` +
            `<small>${pv.spirit_count} spirits · ${pv.spell_count} spellbook · curve ${curve}<br>opens: ${esc(opens)}</small>` +
            `</span>`;
          btn.onclick = () => startGame(seed, o.id, offers);
          p.appendChild(btn);
        });
        const tv = document.createElement("button");
        tv.type = "button";
        tv.className = "style telling";
        tv.setAttribute("aria-label",
          "Watch a 2v2 — the 6 by 6 board: the Solace's pair versus two Lorekeepers, AI-driven.");
        tv.innerHTML = '<span aria-hidden="true"><b>Watch a 2v2</b> — ' +
          "<small>the 6×6 board: the Solace's pair vs two Lorekeepers, AI-driven</small></span>";
        tv.onclick = () => start2v2(seed64());
        p.appendChild(tv);

        // Networked play against the authoritative server. The render path is the
        // same wgpu ink renderer; the server (which holds the engine) ships the
        // legal-move menu with each view, so online play has the full move set.
        const ol = document.createElement("div");
        ol.className = "style";
        ol.style.cursor = "default";
        ol.innerHTML =
          "<b>Play online</b> — <small>host a match, or join with a code.</small>" +
          '<div class="host-form">' +
          '<label>Your name<input id="ho-name" placeholder="optional" autocomplete="off"></label>' +
          '<label>Mode<select id="ho-mode"><option value="1v1">1v1</option><option value="2v2">2v2</option></select></label>' +
          '<label>Opponent faction<select id="ho-faction"><option value="lorekeeper">Lorekeepers</option><option value="solace">the Solace</option></select></label>' +
          '<label>Bot difficulty<select id="ho-diff"><option value="easy">easy</option><option value="normal" selected>normal</option><option value="hard">hard</option></select></label>' +
          '<label id="ho-1v1">Opponent<select id="ho-b"><option value="human">human (invite)</option><option value="bot">bot</option></select></label>' +
          '<span id="ho-2v2" hidden>' +
          '<label>Ally A2<select id="ho-a2"><option value="human">human</option><option value="bot">bot</option></select></label>' +
          '<label>Opp B1<select id="ho-b1"><option value="human">human</option><option value="bot">bot</option></select></label>' +
          '<label>Opp B2<select id="ho-b2"><option value="human">human</option><option value="bot">bot</option></select></label>' +
          "</span>" +
          '<button id="ho-create">Create match</button>' +
          "</div>" +
          '<div class="host-join">Have a code? <button id="ol-join">Join…</button>' +
          ' <small>· <label for="srv">server <input id="srv" value="http://localhost:8080"></label></small></div>';
        p.appendChild(ol);
        const toggleSeats = () => {
          const is2 = $("ho-mode").value === "2v2";
          $("ho-2v2").hidden = !is2;
          $("ho-1v1").hidden = is2;
        };
        $("ho-mode").onchange = toggleSeats;
        toggleSeats();
        $("ho-create").onclick = () => startOnline("host");
        $("ol-join").onclick = () => startOnline("join");
      }

      function startGame(seed, style, offers) {
        const i = offers.findIndex((o) => o.id === style);
        const opp = offers[(i + 1) % offers.length].id; // a seeded opponent style
        const diff = parseInt($("diff")?.value ?? "1", 10);
        game = LocalGame.new_quick(seed, style, opp, diff);
        // #100 Phase D — remember how this telling was started so Rematch can reseed an
        // equivalent one (a fresh seed, the same styles + difficulty); a local vs-bot match.
        lastStart = { kind: "quick", style, opp, diff };
        phaseD.mode = "bot"; phaseD.lastDuskRound = 0;
        clearResultScreen(); cancelDusk();
        // #26 — open the London-lite Mulligan offer at the very start (the engine's window
        // gates whether it actually draws; can_mulligan() is true at the opening, 1v1).
        choiceUi.offer = !!game.can_mulligan(); choiceUi.sig = null;
        $("picker").style.display = "none";
        $("detail").innerHTML = "";
        refresh();
        // #100 Phase C — the match-start announcement: who opens, always naming the
        // first player (design §5). It LEADS the #status live region, then the gameplay
        // prompt refresh() set follows it (so the player keeps the "tap a piece… or End
        // Turn" guidance) — the live region reads the combined line once.
        try {
          const opener = game.opener_announcement();
          if (opener) setStatus(`${opener} ${$("status").textContent}`);
        } catch (_) {}
      }

      // D-16 watch mode: the AI drives all four slots on a timer; we draw the
      // active slot's TeamView each step.
      function start2v2(seed) {
        if (watch) clearInterval(watch);
        clearResultScreen(); cancelDusk();
        choiceUi.offer = false; choiceUi.sig = null; // #26 — the mulligan is a 1v1 opening; never in 2v2
        game = LocalGame.new_2v2(seed);
        lastStart = { kind: "2v2", seed }; phaseD.mode = "2v2";
        $("picker").style.display = "none";
        watch = setInterval(() => {
          if (!game || game.is_over()) { clearInterval(watch); watch = null; }
          else game.auto_play_turn();
          refresh();
        }, 700);
        refresh();
      }

      function applyMove(m) {
        clearSelection(); // a move was made — drop any pick-up + highlights
        // Online/2v2: ship the command to the authoritative server; it pushes back the
        // new redacted view (the frame loop redraws the shell from it). No local engine,
        // no paced replay here — the server's Update/TeamUpdate IS the next frame.
        if (isOnline()) { dispatchCmd(m.cmd, m.label); return; }
        report(game.apply_json(JSON.stringify(m.cmd)), m.label);
        // #100 Phase C — if that ended your turn, WATCH the seeded AI play its whole turn
        // (paced action-by-action). startOpponentReplay() flips on the replay before the
        // next frame (no frame renders the bot's vantage) + restores your frame after.
        if (!game.is_over() && game.active_seat() === "B") startOpponentReplay();
        else refresh();
      }

      // Card detail JSON for `id` — from the local engine when present, else the
      // engine-free canon-catalog lookup (the ONLINE / 2v2 client has no engine). Same
      // shape either way, so inspect renders identically across transports.
      function cardDetailJson(id) {
        return game ? game.card_detail_json(id) : card_detail_by_id_json(id);
      }
      // Reach-grid JSON for `id` — engine-backed locally, catalog-derived online. The
      // grid width follows the live board (5 for 1v1, 6 for 2v2).
      function reachGridJson(id) {
        if (game) return game.reach_grid_json(id);
        return reach_grid_by_id_json(id, board.bw || 5);
      }
      // Card inspect (TUI parity): stats, keywords, rules text, and a mini
      // reach-grid (★ the card · ● a tile it threatens), facing up like the TUI.
      function inspect(id) {
        showDetail(JSON.parse(cardDetailJson(id)), JSON.parse(reachGridJson(id)));
      }
      function reachGrid(rg) {
        let g = "";
        for (let r = 0; r < rg.w; r++) {
          for (let c = 0; c < rg.w; c++) {
            const t = (rg.w - 1 - r) * rg.w + c; // top row = high tile-row (board flip)
            g += t === rg.center ? "★ " : rg.reach.includes(t) ? "● " : "· ";
          }
          g += "\n";
        }
        return g;
      }
      function showDetail(d, rg) {
        const kw = d.keywords.length ? ` · ${d.keywords.join(" · ")}` : "";
        const rules = d.rules ? `<div class="rules">${d.rules}</div>` : "";
        $("detail").innerHTML =
          `<div class="card"><b>${d.name}</b> — ${d.kind} · ${d.resonance} · cost ${d.cost}` +
          `<div class="stats">Atk ${d.attack} · Def ${d.defense} · HP ${d.hp} · reach ${d.reach}${kw}</div>${rules}` +
          `<pre class="reach">${reachGrid(rg)}</pre></div>`;
      }

      function refresh() {
        if (!game) return;
        // The state changed: any prior pick-up + highlights are stale. Keep the
        // keyboard focus cursor (a stable place on the board) but drop the selection.
        clearSelection();
        board.handScroll = 0; // a new hand — start the carousel at its head
        setShellLayout(); // #100 portrait shell for a local 1v1; square otherwise
        board.legal = [];
        const moves = $("moves");
        moves.innerHTML = "";
        if (game.is_2v2()) {
          $("hand").innerHTML = "";
          const v = JSON.parse(game.team_view_json());
          board.bw = v.board_w || 6;
          setStatus(`2v2 · round ${v.round} · slot ${v.active_slot} to act` +
            (game.is_over() ? " · GAME OVER" : " · watching AI"));
          return;
        }
        const view = JSON.parse(game.view_json());
        board.bw = Math.round(Math.sqrt(view.tiles.length)) || 5;
        const r = JSON.parse(game.result_json());
        const hand = $("hand");
        hand.innerHTML = "";
        if (r.over) {
          // #100 Phase D — the telling has ended: show the in-canvas result screen (the
          // verdict in the game's voice + the score breakdown + the Rematch / New opponent
          // / Back to site actions), announced + mirrored in the a11y tree. The canvas
          // keeps drawing (the board shows through the scrim as the souvenir); the live
          // affordance tree is replaced by the result's tree.
          showResultScreen();
          return;
        }
        // Not over: ensure no stale result/dusk overlay lingers (e.g. after a rematch).
        if (phaseD.result) clearResultScreen();
        // #89 running score: Seat A's board points vs Seat B's board points PLUS the
        // Solace's off-board erasure tally (it leaves no board mark — the tally is
        // where forgetting scores; at Nightfall it folds into B's total).
        const sc = JSON.parse(game.score_readout_json());
        const bScore = sc.erasures > 0
          ? `${sc.b_total} (board ${sc.b_board} + ${sc.erasures} erased)`
          : `${sc.b_total}`;
        // #90 Anima is the limiter: there's no action count — play as much as your
        // Anima funds, then End Turn (nothing auto-ends).
        const yourTurn = game.active_seat() === "A";
        setStatus(
          `Round ${view.round} · you are seat ${view.seat} · score A ${sc.a} — B ${bScore} · ` +
          `${view.you.anima} anima (your play budget) — ` +
          (yourTurn ? "tap a piece or card to act, or End Turn." : "the opponent is telling…"));
        // The legal-move list is the source of truth for the canvas affordances + the
        // a11y tree (highlights + move-matching derive from it — never re-derived here).
        board.legal = JSON.parse(game.legal_labeled_json());
        // #100 Phase B — the transitional HTML move buttons + hand chips are RETIRED for
        // the local 1v1 shell: the in-canvas affordances drive every action, and the
        // virtual a11y tree (#shell-a11y, rebuilt by syncA11yTree each draw) is the
        // accessible path at parity. #moves/#hand stay empty here (still used by the
        // online/2v2 paths, which aren't on the shell). The a11y tree is built on the
        // next draw tick (it needs the regions for nothing, but shares the model).
        syncA11yTree();
        // #100 Phase D — if this round is a binding beat (the Dusk after R8, Nightfall at
        // R12) and we haven't shown its set-piece yet, play it now (the rim
        // contracting/darkening + the clock face + the seal, announced). Fires once per
        // binding round, whichever seat crossed the boundary.
        maybePlayRoundSetPiece();
      }

      // True if a command is the opening Mulligan variant ({"Mulligan":{seat}}) — used to
      // detect the open opening window in the server's legal list (the in-canvas offer).
      function isMulligan(cmd) { return cmd && typeof cmd === "object" && "Mulligan" in cmd; }

      // --- Networked play -----------------------------------------------------
      const wsBase = (httpBase) => httpBase.replace(/^http/, "ws");

      // A stable, anonymous per-browser id for usage journeys (no PII; localStorage).
      function sessionId() {
        let s = localStorage.getItem("recollect_sid");
        if (!s) { s = crypto.randomUUID(); localStorage.setItem("recollect_sid", s); }
        return s;
      }

      // Build the create-match query from the host-settings form (seat order
      // [A1, B1, A2, B2] matches the server's MatchSettings).
      function buildHostQuery() {
        const mode = $("ho-mode").value;
        const diff = $("ho-diff").value;
        const fill = (id) => ($(id).value === "bot" ? "bot:" + diff : "human");
        const seats =
          mode === "2v2"
            ? ["human", fill("ho-b1"), fill("ho-a2"), fill("ho-b2")]
            : ["human", fill("ho-b")];
        const params = new URLSearchParams();
        if (mode === "2v2") params.set("mode", "2v2");
        params.set("seats", seats.join(","));
        params.set("faction", $("ho-faction").value);
        return params.toString();
      }

      async function startOnline(kind) {
        const base = ($("srv")?.value || "http://localhost:8080").replace(/\/+$/, "");
        let matchId, token, playerName = "";
        try {
          if (kind === "join") {
            matchId = prompt("match id?"); token = prompt("seat token?");
            if (!matchId || !token) return;
            playerName = (prompt("your name? (optional)") || "").trim();
          } else if (kind === "2v2") {
            const body = await (await fetch(`${base}/matches?mode=2v2`, { method: "POST" })).json();
            matchId = body.match_id; token = body.slot_tokens.A1;
            const s = body.slot_tokens;
            alert(`2v2 match ${matchId} created. You are slot A1.\nGive a token to each other player (they Join):\n\nB1: ${s.B1}\nA2: ${s.A2}\nB2: ${s.B2}`);
          } else if (kind === "host") {
            playerName = $("ho-name").value.trim();
            const body = await (await fetch(`${base}/matches?${buildHostQuery()}`, { method: "POST" })).json();
            if (body.error) { $("status").textContent = "create failed: " + body.error; return; }
            matchId = body.match_id;
            token = body.seat_a_token || (body.slot_tokens && body.slot_tokens.A1);
            if (body.slot_tokens) {
              const s = body.slot_tokens;
              alert(`2v2 match ${matchId}. You are A1.\nInvite codes — B1: ${s.B1}  A2: ${s.A2}  B2: ${s.B2}`);
            } else if (body.seat_b_token) {
              alert(`Match ${matchId} created.\nInvite code (give seat B): ${body.seat_b_token}`);
            }
          } else {
            const q = kind === "bot" ? `?opponent=bot&difficulty=${diffName($("diff")?.value ?? "1")}` : "";
            const body = await (await fetch(`${base}/matches${q}`, { method: "POST" })).json();
            matchId = body.match_id; token = body.seat_a_token;
            if (kind === "new") alert(`match ${matchId} created.\nseat-B token (give it to your opponent — they Join):\n\n${body.seat_b_token}`);
          }
        } catch (e) {
          $("status").textContent = `could not reach the server at ${base} — ${e}`;
          return;
        }
        connectOnline(base, matchId, token);
      }

      function connectOnline(base, matchId, token) {
        if (watch) { clearInterval(watch); watch = null; }
        cancelReplay(); // drop any in-flight local replay
        clearResultScreen(); cancelDusk(); // #100 Phase D — drop any result/Dusk overlay
        game = null;
        $("picker").style.display = "none";
        $("detail").innerHTML = "";
        // #100 — online/2v2 now drive the FULL canvas shell (board · HUD · hand · the
        // affordances + a11y tree), built from the server's redacted view + legal list by
        // OnlineShell. The transitional #moves / #hand DOM are retired (the canvas owns it).
        $("moves").innerHTML = ""; $("hand").innerHTML = "";
        const ws = new WebSocket(`${wsBase(base)}/matches/${matchId}/ws`);
        online = { ws, view: null, team: null, legal: [], seq: 0, names: { you: playerName || "", opp: "" }, mulliganOffered: false };
        phaseD.mode = "pvp"; // online 1v1 (set to "2v2" on the first team message)
        // The portrait shell layout (body.shell) is applied once the FIRST view arrives —
        // shellActive() is still false here (view/team null), so renderOnline/renderOnlineTeam
        // call setShellLayout() after setting online.view/team.
        ws.onopen = () => ws.send(JSON.stringify({ t: "hello", v: protoV, match_token: token, name: playerName || undefined, session_id: sessionId() }));
        ws.onmessage = (ev) => onServerMsg(JSON.parse(ev.data));
        ws.onclose = () => { if (online) $("status").textContent = "connection closed (New game to reconnect)"; };
        ws.onerror = () => { $("status").textContent = "connection error"; };
        $("status").textContent = "connecting…";
      }

      function onServerMsg(m) {
        if (m.t === "welcome" || m.t === "applied" || m.t === "update") {
          online.view = m.view; online.team = null;
          online.legal = m.legal || [];
          // The canvas shell reads `board.legal` for the tap-select / drag affordances —
          // feed it the server's legal moves (the same shape the local engine's is).
          board.legal = online.legal;
          rememberSeatNames(m);
          phaseD.mode = "pvp";
          renderOnline(m.view);
        } else if (m.t === "team_welcome" || m.t === "team_applied" || m.t === "team_update") {
          online.team = m.view; online.view = null;
          online.legal = m.legal || [];
          board.legal = online.legal;
          phaseD.mode = "2v2";
          renderOnlineTeam(m.view);
        } else if (m.t === "rejected") {
          $("status").textContent = `rejected: ${m.reason}`;
        } else if (m.t === "error") {
          $("status").textContent = `server error: ${m.message}`;
        }
        // pong is ignored.
      }

      function sendCmd(cmd) {
        if (!online || online.ws.readyState !== 1) return;
        online.seq += 1;
        online.ws.send(JSON.stringify({ t: "cmd", v: protoV, seq: online.seq, command: cmd }));
      }

      // #100 — cache the session display names from a Welcome's `seat_names` (index =
      // seat): yours (your seat) for the HUD, the opponent's (the other seat) for the
      // strip. Only `welcome` carries them; later Update/Applied omit it, so we keep what
      // we learned. 2v2 has no per-seat names on the wire (the strip uses a team label).
      function rememberSeatNames(m) {
        if (!online) return;
        const sn = m.seat_names;
        if (Array.isArray(sn) && online.view) {
          const me = online.view.seat === "A" ? 0 : 1;
          if (sn[me]) online.names.you = sn[me];
          if (sn[1 - me]) online.names.opp = sn[1 - me];
        }
      }

      // #100 Online 1v1 render: the FULL canvas shell now owns the surface (board · HUD ·
      // hand · the affordances + the a11y tree), built each frame from the server's
      // redacted PlayerView + its legal list by OnlineShell — exactly the shell a local
      // 1v1 draws. This handler only manages the per-message side-effects: the status
      // line, the opening Mulligan offer, the result screen, and the choice announcement.
      // The transitional #moves buttons / #hand chips are RETIRED for online (the design
      // says replace, not parallel) — the canvas + the a11y tree are the path now.
      function renderOnline(view) {
        board.bw = 5;
        setShellLayout(); // online drives the portrait shell — apply body.shell once live
        if (view.phase && view.phase.Finished) { showOnlineResult(); return; }
        clearResultScreen();
        const yourTurn = view.active === view.seat;
        // The opening Mulligan offer: a legal Mulligan in YOUR list means the window is
        // open. Raise the in-canvas modal ONCE per connection (the bridge owns the offer
        // flag; OnlineShell.choice_prompt_json still gates whether it draws — a stale flag
        // past the window shows nothing). Cleared on either pick (Mulligan / Keep).
        const mulliganLegal = yourTurn && online.legal.some((m) => isMulligan(m.cmd));
        if (mulliganLegal && !online.mulliganOffered) {
          choiceUi.offer = true; choiceUi.sig = null; online.mulliganOffered = true;
        }
        const oppName = online.names.opp || "your opponent";
        setStatus(`online · round ${view.round} · ${view.you.anima} anima — ` +
          (yourTurn ? "your move (End Turn when ready)" : `waiting for ${oppName}…`));
      }

      // #100 Online 2v2 render: the full shell over the 6×6 board, built from the active
      // slot's redacted TeamView + its legal list. Your slot's HUD / hand / affordances;
      // the opposing team as combined counts (redaction holds). Same as 1v1 — the #moves /
      // #hand DOM are retired; the status names the active slot, the canvas does the rest.
      function renderOnlineTeam(tv) {
        board.bw = tv.board_w || 6;
        setShellLayout(); // online 2v2 drives the portrait shell — apply body.shell once live
        if (tv.phase && tv.phase.Finished) { showOnlineResult(); return; }
        clearResultScreen();
        const yourTurn = tv.active_slot === tv.slot;
        setStatus(`2v2 · round ${tv.round} · slot ${tv.active_slot} to act · you are ${tv.slot} · ${tv.you.anima} anima — ` +
          (yourTurn ? "your move (End Turn when ready)" : "waiting…"));
      }

      function buildActions() {
        const a = $("actions");
        a.innerHTML = "";
        const b = document.createElement("button");
        b.textContent = "New game";
        b.onclick = () => showPicker();
        a.appendChild(b);
      }

      // Pixel click → tile index, mirroring the board's Y-flip (top visual row is
      // the highest tile-row). Returns null if outside the w×w board. In #100 shell
      // mode the board is a centered SUB-rectangle of the canvas (not the whole
      // surface), so the hit maps into that rect — fetched from the renderer (in
      // backing px; converted to fractions of the CSS box so DPR doesn't matter).
      function clickedTile(ev, w) {
        const c = $("board");
        const r = c.getBoundingClientRect();
        let fx = (ev.clientX - r.left) / r.width;   // 0..1 across the CSS box
        let fy = (ev.clientY - r.top) / r.height;
        if (shellActive()) {
          let br;
          try { br = JSON.parse(renderer.shell_board_rect_json(c.width, c.height)); } catch (_) { return null; }
          // Re-base the click fraction onto the board sub-rect's fraction of the box.
          const bx0 = br.x / c.width, by0 = br.y / c.height;
          const bw = br.w / c.width, bh = br.h / c.height;
          fx = (fx - bx0) / bw;
          fy = (fy - by0) / bh;
        }
        // Resolve through the ONE px→tile map (a unit board rect in fraction space), so this
        // path and the pointer path (`hitRegion`) share the same Y-flip — guarded natively by

      // board hit-testing onto the board sub-rectangle. True for a LOCAL 1v1 telling AND

      // The LOCAL 2v2 WATCH (the AI drives all four slots, no single-seat vantage) keeps

      }

      // #97 Where the keyboard cursor lands when the board first gains focus: the
      // centre tile (a neutral, one-hand-portrait-friendly start near both sides).
      function homeTile() {
        const w = board.bw, c = (w >> 1);

      // wgpu backing buffer is a fixed pixel grid. Match the buffer to the displayed
      // size × devicePixelRatio so it's crisp — not blurrily upscaled — from a 320px
      // phone to a 4K desktop, and never distorted. The board-only modes (picker /
      // online / 2v2) keep a SQUARE box (sized off the rendered side); the #100 shell
      // (local 1v1) is a full PORTRAIT/landscape surface, so there we match the box's

      function fitCanvas() {

          // below the nav) × DPR, so the in-canvas shell fills the viewport, portrait-
          // first, and stays crisp 320px → 4K. (No square clamp — the layout is fluid.)
          w = Math.max(1, Math.round(rect.width * dpr));

        // (hidden by default). Esc closes it; a click outside closes it; focus moves into the
        // panel on open and back to the button on close (keyboard-accessible).

              catch (e) {}
            } else if (localShell) {
              // The full shell, sized to the canvas backing buffer (DPR-aware, set by
              // fitCanvas). The board inside snaps to a new state; the HUD/FABs +
              // affordances update live. Refresh the hit-test regions for the pointer
              // bridge and rebuild the a11y tree from the same model so the canvas and
              // the accessible mirror stay in lockstep.
              const ui = shellUiJson();
              try { renderer.draw_shell(game.shell_model_json(game.move_cues_json(), interactionJson(), ui), cv.width, cv.height); }
              catch (e) { renderer.draw_view_interactive(json, game.move_cues_json(), interactionJson()); }
              refreshRegions();
              syncA11yTree();
              maybeAnnounceChoice(); // #26 — narrate a Glimpse/Mulligan step once per new step
            } else if (onlineShellActive) {
              // #100 ONLINE / 2v2 — the FULL canvas shell, built from the server's redacted
              // view + legal list (OnlineShell), drawn through the SAME draw_shell path as
              // local. The board snaps to each pushed view; the HUD/hand/FABs + affordances
              // update live. Refresh the hit-test regions + rebuild the a11y tree from the
              // same model so the canvas and the accessible mirror stay in lockstep. The
              // opponent is counts/backs only — redaction holds (the client only has the
              // redacted view). A draw failure falls back to the plain board-only draw.
              const ui = shellUiJson();
              try { renderer.draw_shell(onlineShellModelJson(ui), cv.width, cv.height); }
              catch (e) { if (team) renderer.draw_team(json); else renderer.draw_view(json); }
              refreshRegions();
              syncA11yTree();
              maybeAnnounceChoice(); // #26 — narrate a Glimpse/Mulligan step (the online Glimpse)
            } else if (transPrev) {
              const t = Math.min((now - transStart) / 180, 1);
              renderer.draw_blend(transPrev, json, t, team);
              if (t >= 1) transPrev = null;
            } else if (team) {
              // The LOCAL 2v2 WATCH (AI drives all slots): board-only draw with the engine's
              // #90 cues + #97 overlays.
              if (game) renderer.draw_team_interactive(json, game.move_cues_json(), interactionJson());
              else renderer.draw_team(json);
            } else {
              if (game) renderer.draw_view_interactive(json, game.move_cues_json(), interactionJson());
              else renderer.draw_view(json);
            }
          }
          requestAnimationFrame(frame);
        })(performance.now());
      }
      main();
    </script>
  </body>
</html>
