# THE CARDS OF RECOLLECT — the source of truth (all 419 cards).
#
# Generated/authored as strict TOML; `tools/gen_catalog.py` reads THIS file and
# regenerates catalog.json (byte-identical) + the runtime side-data. Never hand-
# edit catalog.json/effects.json/evolution_*.json — edit a [[card]] here, then run
# `make catalog`. The design prose + exemplar commentary live in docs/cards_design.md.
#
# Each [[card]] carries: identity (key/name/kind/rarity/resonance/cost), the game
# state (attack/defense/hp/reach/imprints/keywords/rules), the effect IR
# ([[card.effect]] -> trigger/condition + [[card.effect.clause]] selector/effect/
# duration), evolution lineage ([card.evolution] base/tier/split), and lore/physical.
# Evolution-form cost is DERIVED from stats (no `cost` key); every other card authors it.


[[card]]
key = "zenith-who-asks-the-sky"
name = "Zenith, Who Asks the Sky"
kind = "Spirit"
rarity = "L"
resonance = "Wonder"
cost = 6
attack = 80
defense = 20
hp = 70
reach = "Cross"
imprints = []
keywords = ["Warded"]
rules = "[signature reach: ✶Halo] Storm, Wanderer Warded On arrival: reveal all Fabrications. Your Glimpses take +1 card."
lore_source = "§3"
lore = """
"What is the sky *for*?"
The sky did not answer.
"WHAT IS THE SKY FOR?"
The sky, embarrassed, made a small wind.
"I'll wait," said Zenith.
— it has waited nine hundred years, posture perfect, patience radiant, volume rising roughly once a century. Fabrications reveal themselves in its presence. Out of respect or terror, opinions differ. (Pell: "Respect." Juno: "TERROR. Lovely though.")"""
physical_source = "§3"
physical = """
A vast crane-like being of teal and dawn-gold, tall as weather. Its wingbeats dissolve into question-mark eddies; a slow halo of small glints orbits its head like punctuation looking for a sentence. Eyes like open parentheses. When it lands, the painting gets quieter to hear."""

[[card.effect]]
trigger = "OnPlay"
condition = "Always"

[[card.effect.clause]]
selector = "EnemiesAll"
effect = "RevealFabrication"
duration = "Instant"

[[card.effect]]
trigger = "Static"
condition = "Always"

[[card.effect.clause]]
selector = "Owner"
effect = { Exception = "GlimpseLooksOneMore" }
duration = "WhilePresent"


