[[card]]
key = "ashmane-who-outran-the-ill-intent"
name = "Ashmane, Who Outran the Ill Intent"
kind = "Foundling"
rarity = "L"
resonance = "Neutral"
cost = 0
attack = 50
defense = 30
hp = 60
reach = "Cross"
imprints = ["Flame", "Beast", "Shade"]
keywords = []
rules = "[signature reach: ✶Hunt] Feral. the hardest catch in the game"
behavior = true  # text is controller disposition, not card mechanic
lore_source = "§3"
lore = """
It is the only thing on record that the ill intent chased and lost. What it learned in that chase is carved into every line of it: *being held and being erased feel identical from inside.* So it will not be held. It strikes whatever arrives. It survives what should have ended it, because it has practice. And yet — wounded, cracked open, Echo ringing through it — it has, three times in the Archive's history, let someone stay inside its reach. All three describe the same moment: the running stops. The paper-bare flank rises and falls. And the wild thing decides, against all its evidence, to find out what holding is for. — *"You don't tame Ashmane," says the Ferrier. "You testify."*

---"""
physical_source = "§3"
physical = """
A maned beast — lion in the shoulders, horse in the run — of scorched vermilion dry-brush. Along one flank the ink simply stops: a margin of bare paper in the shape of teeth, where the ill intent almost had it. The mane streams backward even when it stands still. It has not stopped running. It is merely, at the moment, running in place."""


