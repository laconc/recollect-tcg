[advisories]
yanked = "deny"
ignore = [
  # atomic-polyfill: unmaintained, pulled transitively on some targets; the
  # upstream successor is portable-atomic. Not a vulnerability — revisit when a
  # dependency drops it. (RUSTSEC-2023-0089)
  "RUSTSEC-2023-0089",
  # bincode + paste: "unmaintained" advisories (NOT vulnerabilities), pulled
  # transitively by uniffi 0.28 (D-25 bindings). Drop these ignores when uniffi
  # moves off them. (RUSTSEC-2025-0141 bincode, RUSTSEC-2024-0436 paste)
  "RUSTSEC-2025-0141",
  "RUSTSEC-2024-0436",
]

[licenses]
# CC0-1.0 (public-domain dedication, FSF Free/Libre) covers a few leaf crates in
# the wgpu/naga web-renderer tree: hexf-parse, blake3, constant_time_eq.
# MPL-2.0 (file-level weak copyleft) is uniffi + its deps (D-25 native bindings) —
# using the crate doesn't make our code MPL; only edits to their files would.
allow = ["MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception", "BSD-2-Clause", "BSD-3-Clause", "ISC", "Unicode-3.0", "Zlib", "CC0-1.0", "MPL-2.0"]
private = { ignore = true }

[bans]
multiple-versions = "warn"
# Determinism doctrine: `rand` must never reach the engine (recollect-core uses
# the counter-mode RNG). Server-side crates legitimately pull rand (postgres,
# websocket, otel), so a workspace-wide ban is the wrong tool — the invariant is
# enforced directly by `make determinism-check` (recollect-core's runtime tree
# must contain no rand), which CI runs.

[sources]
unknown-registry = "deny"
unknown-git = "deny"
