name: ci
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch: # freshness runs manually for now; re-add a `schedule:` block to automate

env:
  CARGO_TERM_COLOR: always

# Least-privilege default; the docker job opts into packages: write.
permissions:
  contents: read

# The Rust workspace lives in app/; make targets run from the repo root and cd
# into app/ themselves, so make steps stay at the default working directory.
jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:18.4-alpine
        env:
          POSTGRES_USER: recollect
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: recollect
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U recollect" --health-interval 3s
          --health-timeout 3s --health-retries 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          show-progress: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: "1.96.0"
          components: "rustfmt, clippy"
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: app
      # `make test` runs the suite under cargo-nextest (faster scheduling across the
      # ~50 test binaries) + a separate doctest pass. Install the prebuilt binary so
      # the Makefile's `cargo install` fallback is a no-op and the job stays quick.
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-nextest
      - name: formatting
        run: cargo fmt --check
        working-directory: app
      - name: clippy (all targets, warnings are errors)
        run: cargo clippy --all-targets -- -D warnings
        working-directory: app
      - name: workspace tests
        run: make test
      - name: catalog drift gate
        run: make catalog-check
      - name: determinism invariant (engine is rand-free)
        run: make determinism-check
      - name: postgres integration tests
        run: PG_URL=postgres://recollect:ci@localhost:5432/recollect cargo test -p recollect-journal-postgres -p recollect-server -- --ignored
        working-directory: app
      - name: rustdoc builds clean
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps
        working-directory: app

  supply-chain:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          show-progress: false
      - uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1
        with:
          command: "check licenses advisories bans"
          manifest-path: "app/Cargo.toml"

  wasm:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          show-progress: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: "1.96.0"
          targets: "wasm32-unknown-unknown, wasm32-wasip1"
      # Share one wasm build cache with `uitest` (both build the same wasm site),
      # so the wasm dependency graph is compiled once, not twice, run-over-run.
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: app
          shared-key: wasm
      - name: web shell compiles for wasm
        run: cargo build -p recollect-web --target wasm32-unknown-unknown
        working-directory: app
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: wasmtime
      # D-26: the engine must be bit-identical native vs wasm. Run the fixed seeded
      # playout both ways and diff the hashes — any float/UB/iteration drift fails.
      - name: wasm32 determinism differential (native == wasm)
        run: |
          cargo run -q -p recollect-determinism > /tmp/det-native.txt
          cargo build -q -p recollect-determinism --release --target wasm32-wasip1
          wasmtime target/wasm32-wasip1/release/recollect-determinism.wasm > /tmp/det-wasm.txt
          diff /tmp/det-native.txt /tmp/det-wasm.txt && echo "native == wasm ✓"
        working-directory: app
      - name: install trunk
        run: curl -fsSL https://github.com/trunk-rs/trunk/releases/download/v0.21.14/trunk-x86_64-unknown-linux-gnu.tar.gz | tar -xz -C "$HOME/.cargo/bin"
      # The real deployable bundle (catches HTML/wasm-bindgen/wasm-opt breakage the
      # bare `cargo build` misses) + the T-5 size budget (< 3 MB gzipped).
      - name: trunk release build + bundle-size budget
        run: |
          trunk build --release
          sz=$(gzip -c dist/*_bg.wasm | wc -c)
          echo "wasm bundle: $sz bytes gzipped (budget 3145728)"
          test "$sz" -lt 3145728 || { echo "bundle exceeds the 3 MB gz budget"; exit 1; }
        working-directory: app/crates/recollect-web

  helm:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          show-progress: false
      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
      - run: make helm-lint && make helm-template

  docker:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    # Gate the deployable image on the full green suite: don't build (and, on
    # push to main, publish) an image if any correctness / security / wasm / UI /
    # manifest gate failed. Only the always-on jobs are listed — the manual
    # workflow_dispatch jobs (freshness, mutants) are intentionally excluded.
    needs:
      - test
      - supply-chain
      - wasm
      - helm
      - model-check
      - uitest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          show-progress: false
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        if: github.event_name == 'push'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        run: |
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "version=$(grep -m1 '^version' app/Cargo.toml | cut -d'\"' -f2)" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ghcr.io/${{ github.repository }}-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ steps.meta.outputs.date }}
            GIT_REF=${{ github.sha }}
            VERSION=${{ steps.meta.outputs.version }}
            SOURCE_URL=https://github.com/${{ github.repository }}

  freshness:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          show-progress: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: "1.96.0"
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-nextest
      - name: latest deps still build and pass
        run: |
          (cd app && cargo update)
          make test
          (cd app && cargo build --release -p recollect-server)

  # The stateright model-checker (determinism + redaction) is too slow for
  # `make test`, so it runs as its own job.
  model-check:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          show-progress: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: "1.96.0"
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: app
      - name: stateright model-check
        run: make test-verify

  # Mutation testing — minutes to run, so manual dispatch only.
  mutants:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          show-progress: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: "1.96.0"
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: app
      - name: install cargo-mutants
        run: cargo install cargo-mutants --locked
      - name: mutation testing (effects IR — scoped to bound runtime)
        run: make mutants FILE='**/effects.rs'

  # Playwright UI / end-to-end tests (#96) over the BUILT site. Runs on every push
  # to main + pull request, like the rest of the test suite. The wgpu canvas needs
  # a real GL surface, so we run headed Chromium under xvfb; the quarantined Node
  # tooling (tools/uitest/) never touches the cargo graph. `make uitest` locally.
  uitest:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          show-progress: false
      # Building the site needs the Rust toolchain + the wasm target + trunk.
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: "1.96.0"
          targets: "wasm32-unknown-unknown"
      # Share the wasm build cache with the `wasm` job (same wasm site build).
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: app
          shared-key: wasm
      - name: install trunk
        run: curl -fsSL https://github.com/trunk-rs/trunk/releases/download/v0.21.14/trunk-x86_64-unknown-linux-gnu.tar.gz | tar -xz -C "$HOME/.cargo/bin"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: tools/uitest/package-lock.json
      - name: install Playwright deps + browsers (chromium, with OS libs)
        run: |
          cd tools/uitest
          npm ci
          npx playwright install --with-deps chromium
      # xvfb provides a virtual display so headed Chromium can get a real GL
      # surface for the wgpu canvas (make uitest detects xvfb-run automatically).
      - name: install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - name: build the site + run the Playwright UI suite
        # @visual baselines are OS-specific (committed only for darwin so far), so
        # the Linux gate runs the functional suite and skips @visual. To add Linux
        # visual baselines, run `make uitest-update` on Linux and commit them, then
        # drop the grep filter.
        run: |
          export UITEST_GREP_INVERT='@visual'
          make uitest
      - name: upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: tools/uitest/playwright-report
          retention-days: 7
