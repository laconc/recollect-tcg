name: site-deploy
# Build the static marketing/rules/cards/lore/guide site and deploy it to Cloudflare Pages — the
# WEBSITE half of the launch (deploy/site/README.md). This is SEPARATE from the game server's deploy
# (deploy-image.yml → ECR → the EC2 box behind the Cloudflare Tunnel): the website is a pure static
# bundle and belongs on Cloudflare Pages (apex/www), while the game server serves the WebSocket + API
# (and the wasm client's live origin) on its own sub-route. The two deploy on independent cadences.
#
# On a push to main that touches the site sources, this job runs `make site` (the cards page is
# generated from the catalog; the wasm play client is bundled via trunk) and `wrangler pages deploy
# dist/` to the Pages project. Auth is a Cloudflare API token + account id from GitHub SECRETS — never
# committed, so a public clone carries no account specifics and the job simply SKIPS when they're unset.
#
# The Pages PROJECT + its apex/www custom-domain bindings + DNS are Pulumi IaC (deploy/pulumi/platform,
# exported as the `pagesProjectName` stack output); this workflow only BUILDS + direct-uploads dist/.
# DEPLOYMENT-UNIQUE config (Settings → Secrets and variables → Actions) — the residual by-hand bits:
#   var     CF_PAGES_PROJECT        the Pages project name Pulumi created (the `pagesProjectName` output;
#                                   default `recollect-site`). REQUIRED — setting it is the ON switch: the
#                                   job SKIPS unless set (a job-level `if:` can read `vars` not `secrets`).
#   secret  CLOUDFLARE_API_TOKEN    a scoped token with Account · Cloudflare Pages · Edit. REQUIRED to deploy.
#   secret  CLOUDFLARE_ACCOUNT_ID   your Cloudflare account id (same account that owns the zone). REQUIRED.
on:
  push:
    branches:
      - main
    # Only when something that changes the BUILT site moves: the hand-written pages in site/, the
    # cards/lore page generators + their catalog input (cards.html/lore.html are generated by `make
    # site`), the card source upstream of them, or the wasm play client. This workflow itself is a trigger.
    paths:
      - "site/**"
      - "tools/gen_cards_page.py"
      - "tools/gen_lore_page.py"
      - "tools/lore_extract.py"
      - "app/crates/recollect-core/data/catalog.json"
      - "app/crates/recollect-core/data/cards.toml"
      - "app/crates/recollect-web/**"
      - ".github/workflows/site-deploy.yml"
  workflow_dispatch: # manual run (e.g. to re-publish after a content edit) from the Actions tab

env:
  CARGO_TERM_COLOR: always

# Least-privilege default: the deploy job needs only to read the repo (checkout). The Cloudflare
# token is the deploy credential; no GitHub `id-token`/`packages`/`pull-requests` is needed.
permissions:
  contents: read

jobs:
  deploy-site:
    name: build + deploy static site to Cloudflare Pages
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    # Only when the Pages project var is configured — a public clone with no Cloudflare setup just
    # SKIPS, never fails red. (A job-level `if:` can read `vars` but not `secrets`, so this non-secret
    # var is the gate; the API token + account id secrets are consumed by the deploy step below.)
    if: ${{ vars.CF_PAGES_PROJECT != '' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          show-progress: false

      # The wasm play client is bundled by `make site` via trunk; install the pinned Rust toolchain +
      # the wasm target + trunk so dist/client/ is produced. (Without trunk `make site` still
      # assembles the static pages but SKIPS the client — production wants the full bundle.)
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: "1.96.0"
          targets: wasm32-unknown-unknown
      - name: cache cargo + trunk + wasm build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            app/crates/recollect-web/target
          key: site-wasm-${{ runner.os }}-${{ hashFiles('app/Cargo.lock') }}
          restore-keys: site-wasm-${{ runner.os }}-
      - name: install trunk (wasm bundler) if absent
        run: command -v trunk >/dev/null || cargo install --locked trunk

      # Generate the cards page from the catalog, copy site/ → dist/, and bundle the wasm client into
      # dist/client/. Output is dist/ (see deploy/site/README.md for the exact tree).
      - name: build the static site (make site → dist/)
        run: make site

      # Publish dist/ to Cloudflare Pages. `wrangler pages deploy` is a DIRECT upload (no Git repo
      # connected on Cloudflare's side) — the build provenance is THIS workflow, reproducibly. The
      # token + account id come from secrets; the project name from a repo variable (defaulted).
      - name: deploy to Cloudflare Pages (wrangler direct-upload)
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy dist/
            --project-name=${{ vars.CF_PAGES_PROJECT || 'recollect-site' }}
            --branch=main

      - name: summarize
        run: |
          {
            echo "### Deployed static site to Cloudflare Pages"
            echo ""
            echo "- project: \`${{ vars.CF_PAGES_PROJECT || 'recollect-site' }}\`"
            echo "- source: \`dist/\` (built by \`make site\`)"
            echo ""
            echo "Production URL is the project's custom domain (apex/www) — see deploy/site/README.md."
          } >> "$GITHUB_STEP_SUMMARY"
