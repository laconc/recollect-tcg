name: site-deploy
# Build the static marketing/rules/cards/lore/guide site and deploy it to Cloudflare Pages â€” the
# WEBSITE half of the launch (deploy/site/README.md). This is SEPARATE from the game server's deploy
# (deploy-image.yml â†’ ECR â†’ the EC2 box behind the Cloudflare Tunnel): the website is a pure static
# bundle and belongs on Cloudflare Pages (apex/www), while the game server serves the WebSocket + API
# (and the wasm client's live origin) on its own sub-route. The two deploy on independent cadences.
#
# After the `ci` workflow passes on main, this job runs `make site` (the cards page is generated from
# the catalog; the wasm play client is bundled via trunk) and `wrangler pages deploy dist/` to the Pages
# project â€” so a red test/build never publishes the site. Auth is a Cloudflare API token + account id
# from GitHub SECRETS â€” never committed, so a public clone carries no account specifics and the job
# simply SKIPS when they're unset.
#
# The Pages PROJECT + its apex/www custom-domain bindings + DNS are Pulumi IaC (deploy/pulumi/platform,
# exported as the `pagesProjectName` stack output); this workflow only BUILDS + direct-uploads dist/.
# DEPLOYMENT-UNIQUE config (Settings â†’ Secrets and variables â†’ Actions) â€” the residual by-hand bits:
#   var     CF_PAGES_PROJECT        the Pages project name Pulumi created (the `pagesProjectName` output;
#                                   default `recollect-site`). REQUIRED â€” setting it is the ON switch: the
#                                   job SKIPS unless set (a job-level `if:` can read `vars` not `secrets`).
#   secret  CLOUDFLARE_API_TOKEN    a scoped token with Account Â· Cloudflare Pages Â· Edit. REQUIRED to deploy.
#   secret  CLOUDFLARE_ACCOUNT_ID   your Cloudflare account id (same account that owns the zone). REQUIRED.
on:
  # Gate on CI: publish ONLY after the `ci` workflow succeeds on main, so a red test/build/lint never
  # ships a site deploy. `workflow_run` can't take `paths` filters, so this fires on every green main
  # build â€” but `wrangler pages deploy` is an idempotent direct-upload, and this mirrors how the docker
  # image publishes on every green push. (Manual `workflow_dispatch` still re-publishes on demand.)
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: [main]
  workflow_dispatch: # manual run (e.g. to re-publish after a content edit) from the Actions tab

env:
  CARGO_TERM_COLOR: always

# Least-privilege default: the deploy job needs only to read the repo (checkout). The Cloudflare
# token is the deploy credential; no GitHub `id-token`/`packages`/`pull-requests` is needed.
permissions:
  contents: read

jobs:
  # Gate the deploy on THREE things: (a) the Pages project var is set â€” the ON switch; a public clone
  # with no Cloudflare setup just SKIPS, never fails red (a job-level `if:` reads `vars` not `secrets`);
  # (b) the trigger was a SUCCESSFUL ci run (or a manual dispatch) â€” a failed/cancelled ci never reaches
  # here; and (c) this commit actually touched the BUILT site. (c) restores the path-scoping that the old
  # push-trigger `paths:` gave us â€” `workflow_run` can't express `paths`, so we diff the commit instead.
  detect:
    name: detect site changes
    runs-on: ubuntu-24.04
    if: >-
      ${{ vars.CF_PAGES_PROJECT != ''
          && (github.event_name == 'workflow_dispatch'
              || github.event.workflow_run.conclusion == 'success') }}
    outputs:
      deploy: ${{ steps.check.outputs.deploy }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          show-progress: false
          fetch-depth: 2 # need HEAD~1 to diff the (squash) commit against its parent
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - id: check
        run: |
          # A manual dispatch always deploys (you asked for it explicitly).
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"; echo "manual dispatch â€” deploying."; exit 0
          fi
          # Otherwise deploy only when this commit changed something that changes the BUILT site â€” the
          # same set the old push-trigger `paths:` filter used.
          if git diff --name-only HEAD~1 HEAD | grep -qE '^(site/|tools/gen_cards_page\.py|tools/gen_lore_page\.py|tools/lore_extract\.py|app/crates/recollect-core/data/catalog\.json|app/crates/recollect-core/data/cards\.toml|app/crates/recollect-web/|\.github/workflows/site-deploy\.yml)'; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"; echo "site sources changed â€” deploying."
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"; echo "no site-relevant changes â€” skipping deploy."
          fi

  deploy-site:
    name: build + deploy static site to Cloudflare Pages
    needs: detect
    if: ${{ needs.detect.outputs.deploy == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          show-progress: false
          # Deploy exactly the commit that passed ci (workflow_run carries its head_sha); on a manual
          # dispatch there's no workflow_run, so fall back to the dispatched ref.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      # The wasm play client is bundled by `make site` via trunk; install the pinned Rust toolchain +
      # the wasm target + trunk so dist/client/ is produced. (Without trunk `make site` still
      # assembles the static pages but SKIPS the client â€” production wants the full bundle.)
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: "1.96.0"
          targets: wasm32-unknown-unknown
      - name: cache cargo + trunk + wasm build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            app/crates/recollect-web/target
          key: site-wasm-${{ runner.os }}-${{ hashFiles('app/Cargo.lock') }}
          restore-keys: site-wasm-${{ runner.os }}-
      - name: install trunk (wasm bundler) if absent
        run: command -v trunk >/dev/null || cargo install --locked trunk

      # Generate the cards page from the catalog, copy site/ â†’ dist/, and bundle the wasm client into
      # dist/client/. Output is dist/ (see deploy/site/README.md for the exact tree).
      - name: build the static site (make site â†’ dist/)
        run: make site

      # Publish dist/ to Cloudflare Pages. `wrangler pages deploy` is a DIRECT upload (no Git repo
      # connected on Cloudflare's side) â€” the build provenance is THIS workflow, reproducibly. The
      # token + account id come from secrets; the project name from a repo variable (defaulted).
      - name: deploy to Cloudflare Pages (wrangler direct-upload)
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy dist/
            --project-name=${{ vars.CF_PAGES_PROJECT || 'recollect-site' }}
            --branch=main

      - name: summarize
        run: |
          {
            echo "### Deployed static site to Cloudflare Pages"
            echo ""
            echo "- project: \`${{ vars.CF_PAGES_PROJECT || 'recollect-site' }}\`"
            echo "- source: \`dist/\` (built by \`make site\`)"
            echo ""
            echo "Production URL is the project's custom domain (apex/www) â€” see deploy/site/README.md."
          } >> "$GITHUB_STEP_SUMMARY"
