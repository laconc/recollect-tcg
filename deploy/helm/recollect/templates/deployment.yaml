apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "recollect.name" . }}
  labels: {{- include "recollect.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "recollect.name" . }}
  template:
    metadata:
      labels: {{- include "recollect.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "recollect.name" . }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: server
          # image.tag defaults to "latest" (values.yaml); pin per release for production.
          # (The `required "image.tag must be pinned"` guard is commented out for now.)
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext: {{- toYaml .Values.securityContext | nindent 12 }}
          ports: [{ containerPort: 8080, name: http }]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef: { name: {{ .Values.existingSecret }}, key: DATABASE_URL }
            {{- if .Values.otel.enabled }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otel.endpoint | quote }}
            {{- end }}
            - name: RUST_LOG
              value: info
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 2
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 10
          resources: {{- toYaml .Values.resources | nindent 12 }}
