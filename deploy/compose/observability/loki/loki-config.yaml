# Recollect — Loki config for the on-box LGTM stack (mounted at /otel-lgtm/loki-config.yaml).
#
# BASE: a faithful copy of grafana/otel-lgtm:0.28.0's /otel-lgtm/loki-config.yaml (verbatim).
# WE ADDED EXACTLY TWO blocks beyond upstream, to make LOG RETENTION ACTUALLY DELETE (≈7d):
#   * `limits_config.retention_period: 168h` — the 7d window. In Loki a retention PERIOD ALONE does
#     NOT delete anything; the compactor must run with retention enabled (below) for it to take
#     effect. Without the compactor this key is inert.
#   * `compactor:` with `retention_enabled: true` (+ `delete_request_store: filesystem`, a
#     `working_directory`, and a short `retention_delete_delay`/`compaction_interval`) — THIS is the
#     component that enforces the period by deleting aged chunks/index. The filesystem object store
#     (upstream's `common.storage.filesystem`) is the delete-request store too (single-binary box).
#
# Everything else below is upstream verbatim. Keep in sync on an otel-lgtm bump: re-pull
# /otel-lgtm/loki-config.yaml and re-apply just the two blocks marked "RECOLLECT ADDITION".
auth_enabled: false

server:
  http_listen_port: 3100

common:
  instance_addr: 127.0.0.1
  path_prefix: /data/loki
  storage:
    filesystem:
      chunks_directory: /data/loki/chunks
      rules_directory: /data/loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

ruler:
  alertmanager_url: http://127.0.0.1:9093

pattern_ingester:
  lifecycler:
    min_ready_duration: 1s

ingester:
  lifecycler:
    min_ready_duration: 1s

frontend:
  scheduler_dns_lookup_period: 1s
  address: 127.0.0.1

query_scheduler:
  use_scheduler_ring: false

# --- RECOLLECT ADDITION (not in upstream otel-lgtm 0.28.0) ------------------------------------
# Bound log storage to ~7d. The period below is INERT without the compactor that follows it — Loki
# only deletes when a compactor runs with retention enabled. Tune the window via this period.
limits_config:
  retention_period: 168h # 7d (the deploy/README Observability section's documented logs window)

# The compactor is what makes `retention_period` take effect: it compacts the index and DELETES
# data older than the period. `delete_request_store` is required when retention is enabled; on this
# single-binary box the same filesystem object store holds the (rare) delete requests.
compactor:
  working_directory: /data/loki/compactor
  retention_enabled: true
  delete_request_store: filesystem
  compaction_interval: 10m
  retention_delete_delay: 1h
  retention_delete_worker_count: 50
